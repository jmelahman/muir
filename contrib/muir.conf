# Vetted, signed AUR builds from the muir mirror.
#
# Append this stanza to /etc/pacman.conf. After that, `pacman -Syu` / `yay -Syu`
# upgrade these package names from here — never building them from the AUR — so
# only audit-vetted builds get installed.
[muir]
SigLevel = Required
Server = https://github.com/jmelahman/muir/releases/download/repo
