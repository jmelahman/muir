name: sync

# Detect upstream AUR updates and open one PR per outdated package.
on:
  schedule:
    - cron: "17 * * * *"   # hourly, offset to avoid the top-of-hour stampede
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Detect only; do not open PRs"
        type: boolean
        default: false

concurrency:
  group: aur-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      HAS_APP: ${{ secrets.MUIR_APP_ID != '' }}
    steps:
      # Prefer a GitHub App token: its PRs trigger CI AND it's the ruleset
      # bypass actor, so its audit-clean PRs auto-merge. Falls back to a PAT
      # (then GITHUB_TOKEN) until the App is configured.
      - name: Mint GitHub App token
        id: app-token
        if: env.HAS_APP == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MUIR_APP_ID }}
          private-key: ${{ secrets.MUIR_APP_PRIVATE_KEY }}

      - name: Install tooling
        run: pacman -Sy --noconfirm --needed git python github-cli pacman-contrib

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.MUIR_PR_TOKEN || secrets.GITHUB_TOKEN }}

      # Cache the AUR metadata-archive ETag so repeated runs only re-download
      # when the archive actually changed (~5 min refresh upstream).
      - name: Restore archive cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: aur-archive-${{ github.run_id }}
          restore-keys: aur-archive-

      - name: Configure git + auth
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.MUIR_PR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name  "muir-bot"
          git config --global user.email "muir-bot@users.noreply.github.com"

      - name: Detect + open update PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.MUIR_PR_TOKEN || secrets.GITHUB_TOKEN }}
          MUIR_CACHE: .cache
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python tools/sync.py --dry-run
          else
            python tools/sync.py --open-prs --base "${{ github.event.repository.default_branch }}"
          fi
