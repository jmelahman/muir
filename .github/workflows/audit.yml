name: audit

# PR gate: field-based triage -> LLM audit (high-risk only) -> build verification.
# clean / risk:low  -> all checks pass, PR is auto-merge-eligible
# suspicious/malicious -> audit check fails + audit:flagged label -> held for review
#
# The single required status check is `gate` (it aggregates the matrix jobs,
# whose check names are dynamic per package).
# No path filter: the workflow runs on every PR so the required `gate` check
# always reports. The `detect` job no-ops when no package directory changed, and
# the heavy jobs are skipped — `gate` still passes.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---- determine which package dir(s) the PR touches -----------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.find.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: find
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          pkgs=$(git diff --name-only "$BASE...HEAD" \
                  | awk -F/ 'NF>1 {print $1}' | sort -u \
                  | while read -r d; do [ -f "$d/.SRCINFO" ] && echo "$d"; done \
                  | jq -R . | jq -cs .)
          echo "packages=${pkgs:-[]}" >> "$GITHUB_OUTPUT"

  # ---- field-based triage (deterministic, no LLM cost) ---------------------
  triage:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    container: archlinux:latest
    strategy:
      matrix:
        pkg: ${{ fromJson(needs.detect.outputs.packages) }}
      fail-fast: false
    steps:
      - run: pacman -Sy --noconfirm --needed git python pacman-contrib jq
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Triage ${{ matrix.pkg }}
        run: |
          python tools/triage.py \
            --pkg "${{ matrix.pkg }}" \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            -o "triage-${{ matrix.pkg }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: triage-${{ matrix.pkg }}
          path: triage-${{ matrix.pkg }}.json

  # ---- LLM audit (runs always; self-skips when triage says low risk) -------
  # Backend is selected by `MUIR_AUDIT_BACKEND` (repo variable), default
  # openrouter. audit.py auto-detects from available credentials otherwise.
  audit:
    needs: [detect, triage]
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      MUIR_AUDIT_BACKEND: ${{ vars.MUIR_AUDIT_BACKEND || 'openrouter' }}
      MUIR_AUDIT_MODEL: ${{ vars.MUIR_AUDIT_MODEL }}
    strategy:
      matrix:
        pkg: ${{ fromJson(needs.detect.outputs.packages) }}
      fail-fast: false
    steps:
      - run: pacman -Sy --noconfirm --needed git python github-cli jq
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/download-artifact@v4
        with:
          name: triage-${{ matrix.pkg }}
      # Only the subscription-token backend needs the Claude CLI (Node).
      - name: Install Claude CLI
        if: env.MUIR_AUDIT_BACKEND == 'claude-cli'
        run: |
          pacman -S --noconfirm --needed nodejs npm
          npm install -g @anthropic-ai/claude-code
      # Only the direct Anthropic backend needs the SDK.
      - name: Install Anthropic SDK
        if: env.MUIR_AUDIT_BACKEND == 'anthropic'
        run: |
          pacman -S --noconfirm --needed python-pip
          python -m venv /opt/venv && /opt/venv/bin/pip install -q anthropic
      - name: Audit ${{ matrix.pkg }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PY=python
          [ -x /opt/venv/bin/python ] && PY=/opt/venv/bin/python
          "$PY" tools/audit.py \
            --pkg "${{ matrix.pkg }}" \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --triage "triage-${{ matrix.pkg }}.json" \
            --pr "${{ github.event.pull_request.number }}"

  # ---- build verification (NO secrets; executes untrusted PKGBUILD code) ---
  # Security boundary: this job runs makepkg/namcap on untrusted package code,
  # so it deliberately has no access to any audit credential or write token.
  build-check:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    container: archlinux:latest
    permissions:
      contents: read
    strategy:
      matrix:
        pkg: ${{ fromJson(needs.detect.outputs.packages) }}
      fail-fast: false
    steps:
      - run: pacman -Sy --noconfirm --needed base-devel git namcap
      - uses: actions/checkout@v4
      # makepkg refuses to run as root; use an unprivileged build user.
      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify .SRCINFO matches PKGBUILD
        working-directory: ${{ matrix.pkg }}
        run: |
          sudo -u builder makepkg --printsrcinfo > .SRCINFO.gen
          diff -u .SRCINFO .SRCINFO.gen
      - name: Lint with namcap
        working-directory: ${{ matrix.pkg }}
        run: namcap -i PKGBUILD || true

  # ---- single stable required check ----------------------------------------
  # Matrix job check names are dynamic (e.g. "audit (foo)"), so branch
  # protection requires THIS aggregate context instead. Passes for non-package
  # PRs (jobs skipped) and fails if any gating job failed.
  gate:
    needs: [detect, triage, audit, build-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gating jobs
        run: |
          echo "triage=${{ needs.triage.result }} audit=${{ needs.audit.result }} build=${{ needs.build-check.result }}"
          for r in "${{ needs.triage.result }}" "${{ needs.audit.result }}" "${{ needs.build-check.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a gating job did not pass"; exit 1
            fi
          done
          echo "gate passed"
